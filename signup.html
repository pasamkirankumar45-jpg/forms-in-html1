  <!DOCTYPE html>
<html lang="en">
<head>
    <title>Document</title>
</head>
<body>

    <form action="./signup.html">

        <label for="name">Full Name</label><br>
        <input type="text" id="name" name="name" required><br><br>

        <label for="email">Email</label><br>
        <input type="email" id="email" name="email" required><br><br>

        <label for="number">Enter Number</label><br>
        <input type="number" id="number" name="number" required><br><br>

        <label for="password">Enter Password</label><br>
        <input type="password" id="password" name="password" required><br><br>

        <label for="date">Date of Birth</label><br>
        <input type="date" id="date" name="date" required><br><br>

        <label for="address">Address</label><br>
        <input type="text" id="address" name="address" placeholder="Enter address" required><br><br>

        <label for="country">Country</label><br>
        <input type="text" id="country" name="country" placeholder="Enter country" required><br><br>

        <label>Gender</label><br>
        <input type="radio" id="male" name="gender" value="Male" required>
        <label for="male">Male</label>

        <input type="radio" id="female" name="gender" value="Female">
        <label for="female">Female</label>

        <input type="radio" id="other" name="gender" value="Other">
        <label for="other">Other</label>
        <br><br>

        <input type="submit" value="Submit" formaction="./submit.html">

    </form>

</body>
